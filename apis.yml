description: >-
  Casey's General Stores is one of the largest convenience store chains in the
  United States, operating more than 2,900 stores selling fuel, made-from-scratch
  pizza, prepared food, and other convenience items primarily in small
  midwestern communities. Casey's is a publicly traded Fortune 500 company
  (NASDAQ: CASY) and offers a mobile app for pizza ordering, delivery, and
  its Casey's Rewards loyalty program. No public developer APIs have been
  documented; partner and supplier integrations are managed privately.
